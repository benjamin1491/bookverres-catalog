name: Restaurer une version précédente

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Date de la version à restaurer (format jj/mm/aa, ex: 15/05/26)"
        required: true
        type: string

jobs:
  restore:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Récupérer la branche output
        uses: actions/checkout@v4
        with:
          ref: output
          fetch-depth: 0

      - name: Rechercher et restaurer la version demandée
        run: |
          TARGET="${{ github.event.inputs.date }}"
          COMMIT=$(git log --oneline | grep "$TARGET" | head -1 | awk '{print $1}')

          if [ -z "$COMMIT" ]; then
            echo "❌ Aucune version trouvée pour la date '$TARGET'."
            echo ""
            echo "Versions disponibles :"
            git log --oneline
            exit 1
          fi

          echo "✅ Restauration de la version du $TARGET ($COMMIT)"
          git checkout "$COMMIT" -- verres_complet.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Restauration du $TARGET (rollback #${{ github.run_number }})"
          git push origin output
